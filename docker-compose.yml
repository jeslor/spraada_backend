services:
  dev-db:
    image: postgres:13
    ports:
      - '5435:5432'
    environment:
      - POSTGRES_USER=spraada_dev
      - POSTGRES_PASSWORD=spraada_dev_password
      - POSTGRES_DB=spraada_dev_db
    networks:
      - spraada-network

  dev-redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - spraada-network

networks:
  spraada-network:
    driver: bridge
